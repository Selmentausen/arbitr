version: '3.8'

services:
  # Main application (for future use)
  app:
    build: .
    container_name: arbitr-app
    volumes:
      - ./configs:/app/configs
      - ./logs:/app/logs
      - ./data:/app/data
      - ./src:/app/src  # Mount for development
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=arbitr
      - POSTGRES_USER=arbitr_user
      - POSTGRES_PASSWORD=arbitr_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - arbitr-network
    command: tail -f /dev/null  # Keep container running for development

  # PostgreSQL database (for Phase 4 - Storage Layer)
  postgres:
    image: postgres:15-alpine
    container_name: arbitr-postgres
    environment:
      - POSTGRES_DB=arbitr
      - POSTGRES_USER=arbitr_user
      - POSTGRES_PASSWORD=arbitr_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - arbitr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbitr_user -d arbitr"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching (for Phase 5 - Linkage Module)
  redis:
    image: redis:7-alpine
    container_name: arbitr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - arbitr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  arbitr-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
