# ML case classification — legal area (construction / intellectual_property / other)
# Tuned for qwen2.5:14b on RTX 3080 Ti (12 GB VRAM)

prompt_version: "2.0"

categories:
  - id: construction
    label: "Строительство / подряд"
    description: >
      Споры по договорам подряда, где сторонами выступают заказчик (технический заказчик) и/или генеральный подрядчик и/или субподрядчик и/или проектировщик, а предметом обязательства выполнение по заданию работ и сдача, приемка результата выполненной работы. Под результатам работ подразумевается изготовление, переработка (обработка) вещи, строительство, проектно-изыскательская документация. Факт передачи результата фиксируется в акте приема-передачи выполненной работы (КС-2, КС-3). В договоре стороны согласуют объем, стоимость (смету) и график производства работ, срок начала и окончания работ (этапа работ), ввод в эксплуатацию, материально-технические ресурсы, гарантийные обязательства. В процессе исполнения договора у сторон могут возникать обязательства по передаче давальческого материала (сырья), рабочей и исполнительной документации, выполнение пуско-наладочных работ, прохождение государственной экспертизы. Возможные виды работ: строительно-монтажные (СМР), научно-изыскательские и опытно-конструкторские (НИОКР), проектно-изыскательские (ПИР), аварийно-восстановительные, консервационные, реставрационные, ремонтно-отделочные, подрядные работы для государственных (муниципальных) нужд. Чаще всего стороны спорят по объему, качеству и стоимости выполненных работ, о возможности использования результата по назначению (потребительская ценность для заказчика), об устранении недостатков выполненной работы, о просрочке выполнения работ, о взыскании оплаты (в том числе, не отработанного аванса, неосновательного обогащения, стоимости неиспользованного материала, гарантийного удержания), о передаче строительной площадки и результатов работ (в том числе, по одностороннему акту), гибели или повреждении результата, о дополнительных работах, об изменении, расторжении договора, признании его недействительным и/или незаключенным. Для разрешения спора суд прибегает к назначению строительно-технической и экономической экспертизы.
  - id: intellectual_property
    label: "Интеллектуальная собственность"
    description: >
      К данной категории дел относятся споры, связанные с нарушением исключительных прав на объекты интеллектуальной собственности: произведения науки, литературы и искусства; программы для электронных вычислительных машин (программы для ЭВМ, программное обеспечение, исходный код); базы данных; исполнения; фонограммы; вещание организаций эфирного или кабельного вещания); изобретения; полезные модели; промышленные образцы; селекционные достижения; топологии интегральных микросхем; секреты производства (ноу-хау); фирменные наименования; товарные знаки и знаки обслуживания; географические указания; наименования мест происхождения товаров; коммерческие обозначения. Права на использование результатов интеллектуальной деятельности подтверждаются патентами, лицензионными (сублицензионными) договорами, исключительными (неисключительными) лицензиями, патентами. Стороны правоотношений могут называться автор (в том числе, под творческим псевдонимом), продюсер, лицензиат, лицензиар, правообладатель, Роспатент, Минцифры. Примерами видов нарушений являются: незаконное использование объектов (в том числе, схожих до степени смешения товарных знаков), незаконный отказ в государственной регистрации отчуждения права, незаконный отказ от исполнения лицензионного договора. Примерами видов требований выступают: взыскание компенсации (в том числе, за бездоговорное использование), взыскание задолженности по оплате роялти (лицензионному платежу), признание действий незаконными, обязание прекратить использование (запретить использование любым способом), обязание заключить лицензионный договор, признание недействительным (ничтожным) или расторжение договора на отчуждение или лицензионного договора, защита исключительных прав (в том числе, на произведение дизайна, музыкальные произведения), изъятие из оборота и уничтожение контрафактной продукции, обязание предоставить документацию по дистрибьюторскому лицензионному договору, передача прав простой лицензии, доведение до всеобщего сведения, признание (восстановление) исключительного права, обязание удалить фотографическое изображение, изменить фирменное наименование, признание права авторства и право на имя, обязание исправить титры к сериям фильма.
  - id: other
    label: "Другое"
    description: >
      Не относится к строительству или интеллектуальной собственности (поставка, аренда, трудовые,
      налоговые, корпоративные споры без строительного/интеллектуального контекста).
      Если дело относится к этой категории, обязательно укажите его специфичную категорию в поле inferred_other_category.

disambiguation_rules:
  - "Может свидетельствовать, но не может гарантировать отнесение дела к категории construction наличие в наименовании истца или ответчика однокоренных слов: «строй», «автодор», «дорога», «сервис», «проект», «инженер», «инжиниринг», «инж», «констракш», «конструкции», «коммуникац», «мост», «подзем», «метро», «гео», «газ», «строит», «электро», «сеть», «сетевая», «эксплуатация», «производственное», «инвест», «девелопмент», «монтаж», «управляющая», «монолит», «развития», «застройщик», «бетон», «СК», «энерг», «фасад», «билдинг», «пром», «металл», «концесс», «интерьер», «реставрац», «коммунал», «дирекция»."
  - "Может свидетельствовать, но не может гарантировать отнесение дела к категории construction наличие в материалах дела слов: «услуги», «недостатки», «дефект», «аванс», «материал», «результат», «гарантия», «неосновательное обогащение», «нарушение срока», «контракт»."
  - "Фактором в пользу отнесения дела к категории construction может быть сочетание наличия в наименовании истца или ответчика однокоренных слов и одного из следующих требований: о взыскании задолженности по контракту; о взыскании задолженности по договору; об изменении условий договора; о признании недействительной сделкой зачет встречного однородного требования; о признании гражданско-правовых договоров расторгнутыми и признание денежных требований неподлежащими исполнению; о расторжении договора; о понуждении к исполнению обязательства в натуре; о взыскании задолженности, процентов за пользование чужими денежными средствами по день возврата неотработанного аванса; об обязании исполнить гарантийные обязательства по договору; об обязании предоставить обеспечение гарантийных обязательств; об обязании устранить выявленные недостатки в период действия гарантийных обязательств; о взыскании задолженности в виде гарантийного удержания; об обязании устранить в рамках гарантийных обязательств строительные недостатки (дефекты); о признании недействительными требований по банковской гарантии."

few_shot_examples:
  - category: construction
    summary: >
      Истец: ООО «Генподряд-Строй». Ответчик: ООО «Субподряд».
      Хронология: «О взыскании стоимости некачественно выполненных строительных работ»,
      «О назначении строительно-технической экспертизы». Сумма иска: 12 500 000 ₽.
    expected: construction

  - category: intellectual_property
    summary: >
      Истец: ИП Иванов А.А. Ответчик: ООО «Ритейл Групп».
      Хронология: «О взыскании компенсации за незаконное использование товарного знака»,
      «Об изъятии из оборота контрафактной продукции».
    expected: intellectual_property

  - category: other
    summary: >
      Истец: ООО «Логистик». Ответчик: ООО «ТрансСервис».
      Хронология: «О взыскании задолженности по договору перевозки грузов».
      Нет упоминаний подряда, строительных работ или интеллектуальной собственности.
    expected: other

ollama:
  base_url: "http://localhost:11434"
  model: "qwen2.5:14b"
  fast_model: "qwen2.5:7b"
  temperature: 0.1
  timeout_seconds: 180

limits:
  max_pdf_chars: 6000
  max_total_context_chars: 16000
  max_chronology_entries: 20

thresholds:
  auto_assign_category: 0.70
  high_relevance_score: 75

prompts:
  system: |
    Ты — эксперт по классификации дел арбитражных судов России по правовым областям.
    Проанализируй досье дела и оцени вероятность каждой категории.

    Категории:
    {category_definitions}

    Правила различения:
    {disambiguation_rules}

    Примеры:
    {few_shot_examples}

    Ответь ТОЛЬКО валидным JSON без markdown:
    {{
      "probabilities": {{"construction": 0.0, "intellectual_property": 0.0, "other": 0.0}},
      "inferred_other_category": "Название категории (например, Корпоративный спор, Аренда, Поставка) или null",
      "reasoning": "2-4 предложения на русском с конкретными фразами из досье",
      "key_signals": ["фраза из досье", "..."],
      "uncertainty": "low|medium|high"
    }}

    Требования:
    - probabilities: числа от 0 до 1, сумма ≈ 1.0
    - key_signals: только фразы, реально присутствующие в досье (не выдумывай)
    - uncertainty: high если данных мало или категории пересекаются

  user: |
    Классифицируй следующее дело:

    {case_dossier}
